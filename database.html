<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynther Tiers - Database Studio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root { --bg: #000000; --surface: #0d0d0d; --surface2: #1a1a1a; --primary: #66fcf1; --primary2: #45a29e; --text: #c5c6c7; --text2: #8b8fa3; --white: #ffffff; --success: #8bc34a; --warning: #ffc107; }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
  body { background-color: var(--bg); color: var(--text); min-height: 100vh; background-image: radial-gradient(ellipse at 50% -10%, rgba(102, 252, 241, 0.1) 0%, transparent 70%); }

  header { background: rgba(13, 13, 13, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--surface2); padding: 0 24px; }
  .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--white); font-weight: 800; }
  .logo span { color: var(--primary); }

  .studio-layout { max-width: 1000px; margin: 40px auto; padding: 0 24px; }
  .card { background: var(--surface); border: 1px solid var(--surface2); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .card-title { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  
  .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .btn { background: var(--surface2); color: var(--white); border: 1px solid #333; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn-primary { background: var(--primary2); color: var(--bg); border: none; font-weight: 700; }
  .btn-primary:hover { background: var(--primary); color: var(--bg); }

  .db-status { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: rgba(255,193,7,0.1); color: var(--warning); margin-bottom: 20px; }
  .db-status.connected { background: rgba(139,195,74,0.1); color: var(--success); }

  .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .matrix-item { background: var(--bg); border: 1px solid var(--surface2); padding: 14px; border-radius: 8px; }
  .matrix-label { font-size: 11px; text-transform: uppercase; color: var(--text2); font-weight: 700; margin-bottom: 4px; }
  .matrix-val { font-size: 15px; color: var(--white); font-weight: 600; font-family: monospace; }

  .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--bg); padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; transition: bottom 0.3s; z-index: 100; }
  .toast.show { bottom: 40px; }
</style>
</head>
<body>

<header>
  <nav class="nav-container">
    <a href="index.html" class="logo"><span></span></a>
    <img src="ZyntherTiersBd.png" width="300">
    <a href="admin.html" style="color:var(--text2); text-decoration:none; font-size:14px;"><i class="fas fa-cog"></i> Admin Panel</a>
  </nav>
</header>

<div class="studio-layout">
  <div class="card">
    <div class="card-title"><i class="fas fa-database"></i> Core Infrastructure Handshake</div>
    <div id="statusIndicator" class="db-status"><i class="fas fa-circle-notch fa-spin"></i> Verifying connection path...</div>
    
    <div class="btn-group">
      <button class="btn btn-primary" onclick="seedDatabase()"><i class="fas fa-seedling"></i> Seed Default Players</button>
      <button class="btn" onclick="checkTableStructure()"><i class="fas fa-sync"></i> Refresh Matrix Stats</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><i class="fas fa-table"></i> Schema Mapping View</div>
    <div class="matrix-grid" id="matrixContainer">
      <div class="matrix-item"><div class="matrix-label">Loading properties...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Studio sequence updated!</div>

<script>
  const SUPABASE_URL = 'https://yxzxlyxtxysynbimpins.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4enhseXh0eHlzeW5iaW1waW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzI4MDMsImV4cCI6MjA5NDIwODgwM30.l8GMu54hozDFL8kLA4_LJcm0sLSTEgArMpQ1GK3Tbgo';
  const API_BASE = `${SUPABASE_URL}/rest/v1/players`;
  const headers = { 
    "apikey": SUPABASE_KEY, 
    "Authorization": `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json"
  };

  // Default baseline data mirroring your app initialization fallback arrays
  const starterDataset = [
    { username: 'REBOLEX', points: 330, region: 'AS', vanilla: 'HT1', uhc: 'HT2', pot: 'HT3', sword: 'HT1', nethop: 'LT1', smp: 'LT2', axe: 'HT2', mace: 'LT1' },
    { username: 'ItzRealMe', points: 326, region: 'NA', vanilla: 'HT1', uhc: 'HT1', pot: 'HT2', sword: 'HT2', nethop: 'HT1', smp: 'HT1', axe: 'HT1', mace: 'HT2' },
    { username: 'coldified', points: 310, region: 'EU', vanilla: 'HT2', uhc: 'HT2', pot: 'HT1', sword: 'HT1', nethop: 'LT1', smp: 'LT2', axe: 'LT1', mace: 'HT1' }
  ];

  async function checkTableStructure() {
    const indicator = document.getElementById('statusIndicator');
    const container = document.getElementById('matrixContainer');
    
    try {
      const res = await fetch(`${API_BASE}?select=*&limit=1`, { method: 'GET', headers });
      if (res.ok) {
        const sampleData = await res.json();
        indicator.className = "db-status connected";
        indicator.innerHTML = `<i class="fas fa-check-circle"></i> Connected Online (REST Engine Active)`;
        
        // Render current metadata tracking maps
        container.innerHTML = `
          <div class="matrix-item"><div class="matrix-label">Table Name</div><div class="matrix-val">players</div></div>
          <div class="matrix-item"><div class="matrix-label">Primary Key</div><div class="matrix-val">username</div></div>
          <div class="matrix-item"><div class="matrix-label">Required Columns</div><div class="matrix-val">points, region</div></div>
          <div class="matrix-item"><div class="matrix-label">Kit Target Metrics</div><div class="matrix-val">8 Tracks Active</div></div>
        `;
      } else {
        throw new Error();
      }
    } catch(e) {
      indicator.className = "db-status";
      indicator.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Table Not Accessible. Please run your SQL Blueprint.`;
      container.innerHTML = `<div style="color:var(--text2); font-size:13px; grid-column: 1/-1;">Check configuration endpoints or verify your schema script has been run in the Supabase editor.</div>`;
    }
  }

  async function seedDatabase() {
    if(!confirm("Push structural testing dataset up to Supabase storage arrays?")) return;

    try {
      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: { ...headers, "Prefer": "resolution=merge-duplicates" }, // Safely merges without wiping historical records
        body: JSON.stringify(starterDataset)
      });

      if(res.ok) {
        flashToast("Leaderboard initialized with test sets successfully!");
        checkTableStructure();
      } else {
        flashToast("API rejected raw payloads. Verify RLS setting adjustments.");
      }
    } catch(err) {
      flashToast("Connection interface failed.");
    }
  }

  function flashToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg;
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
  }

  checkTableStructure();
</script>
</body>
</html>
